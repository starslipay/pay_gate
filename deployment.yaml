apiVersion: apps/v1
kind: Deployment
metadata:
  name: pay-gate
  namespace: gateway-ns
  labels:
    app: pay-gate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pay-gate
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pay-gate
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: pay-gate
        image: pay_gate
        imagePullPolicy: Never
        ports:
        - containerPort: 8888
          name: http
        env:
        - name: TZ
          value: "Asia/Shanghai"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/pay_gate/health
            port: 8888
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/pay_gate/health
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - pay-gate
              topologyKey: kubernetes.io/hostname
      restartPolicy: Always
