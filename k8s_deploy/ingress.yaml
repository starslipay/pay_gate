apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pay-gate-ingress
  namespace: pay-ns
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/ssl-redirect: "false"
    traefik.ingress.kubernetes.io/rule-type: PathPrefixStrip
spec:
  rules:
  - host: pay-gate.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pay-gate-service
            port:
              number: 8888
