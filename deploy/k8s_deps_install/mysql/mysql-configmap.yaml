apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: pay-ns
data:
  master.cnf: |
    [mysqld]
    server-id=1
    log-bin=mysql-bin
    gtid-mode=ON
    enforce-gtid-consistency=ON
    binlog-format=ROW
    default-authentication-plugin=mysql_native_password
    max_connections=2000
    plugin-load-add=rpl_semi_sync_master.so
    rpl_semi_sync_master_enabled=1
    rpl_semi_sync_master_timeout=0
  slave.cnf: |
    [mysqld]
    server-id=101
    log-bin=mysql-bin
    gtid-mode=ON
    enforce-gtid-consistency=ON
    binlog-format=ROW
    default-authentication-plugin=mysql_native_password
    max_connections=2000
    plugin-load-add=rpl_semi_sync_slave.so
    rpl_semi_sync_slave_enabled=1
    read_only=1
    super_read_only=1