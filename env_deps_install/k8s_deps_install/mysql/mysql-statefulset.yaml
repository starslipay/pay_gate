apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: pay-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mysql
  serviceName: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      nodeSelector:
        business-worker: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - mysql
            topologyKey: kubernetes.io/hostname
      initContainers:
      - name: init-config
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          INDEX=${HOSTNAME##*-}
          if [ $INDEX -eq 0 ]; then
            cp /mnt/config/master.cnf /etc/mysql/conf.d/my.cnf
          else
            cp /mnt/config/slave.cnf /etc/mysql/conf.d/my.cnf
            sed -i "s/server-id=101/server-id=$((100 + $INDEX))/g" /etc/mysql/conf.d/my.cnf
          fi
        volumeMounts:
        - name: config-volume
          mountPath: /mnt/config
        - name: config
          mountPath: /etc/mysql/conf.d
      containers:
      - name: mysql
        image: mysql:8.0
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: root-password
        - name: MYSQL_DATABASE
          value: pay_db
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: password
        volumeMounts:
        - name: config
          mountPath: /etc/mysql/conf.d
        - name: data
          mountPath: /var/lib/mysql
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config-volume
        configMap:
          name: mysql-config
      - name: config
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: local-path
      resources:
        requests:
          storage: 20Gi
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate